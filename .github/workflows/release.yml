name: Release

# GitHub Pages serves the ./docs folder, and the Kodi repository lives in
# ./docs/repo (committed). Publishing therefore works like this:
#
#   1. python3 .github/scripts/build_repo.py   # regenerate ./docs/repo
#   2. commit ./docs/repo + the addon.xml version bump
#   3. git push origin master
#   4. git tag vX.Y.Z && git push origin vX.Y.Z
#
# This workflow deploys Pages itself (on push to master) instead of relying
# on GitHub's auto-generated "pages build and deployment" workflow - that one
# isn't ours to edit and its first deploy attempt was failing on essentially
# every release, only succeeding on a manual re-run. The deploy step below
# retries once in-workflow to absorb that same flakiness automatically.
#
# The release job runs on the tag: it verifies the committed repo matches the
# version and publishes a GitHub Release with the zips.

on:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify committed repo matches the skin version
        run: |
          VER=$(python3 -c "import xml.etree.ElementTree as ET; print(ET.parse('addon.xml').getroot().get('version'))")
          echo "skin version: $VER"
          if [ ! -f "docs/repo/skin.fentastic/skin.fentastic-$VER.zip" ]; then
            echo "::error::docs/repo/skin.fentastic/skin.fentastic-$VER.zip is missing."
            echo "::error::Run 'python3 .github/scripts/build_repo.py' and commit ./docs/repo before tagging."
            exit 1
          fi
          HELPER_VER=$(python3 -c "import xml.etree.ElementTree as ET; print(ET.parse('script.fentastic.helper/addon.xml').getroot().get('version'))")
          echo "helper version: $HELPER_VER"
          if [ ! -f "docs/repo/script.fentastic.helper/script.fentastic.helper-$HELPER_VER.zip" ]; then
            echo "::error::docs/repo/script.fentastic.helper/script.fentastic.helper-$HELPER_VER.zip is missing."
            echo "::error::Run 'python3 .github/scripts/build_repo.py' and commit ./docs/repo before tagging."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docs/repo/skin.fentastic/skin.fentastic-*.zip
            docs/repo/repository.fentastic/repository.fentastic-*.zip
            docs/repo/script.fentastic.helper/script.fentastic.helper-*.zip

  deploy-pages:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Deploy to GitHub Pages (retry)
        if: steps.deploy1.outcome == 'failure'
        id: deploy2
        uses: actions/deploy-pages@v4
