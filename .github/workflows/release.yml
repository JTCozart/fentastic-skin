name: Package and Release

# Two things happen here:
#   * On a version tag (v*): package the skin + repository add-on and publish a
#     GitHub Release with the zips attached.
#   * On push to the default branch (or manual run): build the landing page +
#     Kodi repository and deploy them to GitHub Pages.
#
# Pages is deployed from the default branch (not the tag) so it satisfies the
# github-pages environment's default "deploy from default branch" protection
# rule. A normal release = commit the version bump to master, then push the tag;
# the master push deploys Pages and the tag push cuts the Release.

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build site and Kodi repository
        run: python3 .github/scripts/build_repo.py

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            _site/repo/skin.fentastic/skin.fentastic-*.zip
            _site/repo/repository.fentastic/repository.fentastic-*.zip

  deploy:
    needs: build
    # Only deploy Pages from the default branch (or a manual run) - tags are
    # blocked by the github-pages environment protection rule.
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
